{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width:420px; margin:60px auto;">
  <div style="text-align:center; margin-bottom:28px;">
    <div style="font-size:32px; font-weight:800; color:var(--teal);">SankofahEye</div>
    <div style="font-size:13px; color:var(--muted); margin-top:6px;">
      Passive Exposure Intelligence Platform
    </div>
  </div>

  <div class="card">
    <h2>Sign in to your account</h2>
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@organisation.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
        Sign in
      </button>
    </form>
    <p style="text-align:center; font-size:12px; color:var(--muted); margin-top:16px;">
      No account? <a href="{{ url_for('auth.register') }}" style="color:var(--teal);">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
